name: Release

# Build prebuilt binaries and attach them to a GitHub Release when a version
# tag (e.g. v0.1.0) is pushed:  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: zip
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.ext == 'tar.gz'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czvf "${{ github.workspace }}/rza-${{ matrix.target }}.tar.gz" rza

      - name: Package (Windows)
        if: matrix.ext == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/rza.exe `
            -DestinationPath rza-${{ matrix.target }}.zip

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: rza-${{ matrix.target }}.${{ matrix.ext }}
